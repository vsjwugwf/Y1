name: YouTube Bale Bot

on:
  schedule:
    # هر ۶ ساعت یکبار ربات رو از نو راه‌اندازی کن (برای اطمینان از اینکه همیشه زنده می‌مونه)
    - cron: '0 */6 * * *'
  workflow_dispatch:      # امکان اجرای دستی
  push:
    branches: [ main ]    # برای تست اولیه

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # ۶ ساعت حداکثر زمان مجاز (ربات خودش ۵:۵۵ می‌خوابه)

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🤖 Run Bale Bot (5h55m run / 5m sleep cycle)
        env:
          BALE_TOKEN: ${{ secrets.BALE_TOKEN }}
        run: python bot/bale_bot.py
