name: YouTube Bale Bot

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-telegram-bot==20.8 yt-dlp aiohttp

      - name: 🧪 TEST ENVIRONMENT (Diagnostic)
        env:
          BALE_TOKEN: ${{ secrets.BALE_TOKEN }}
        run: python test_env.py

      - name: 🤖 Run Bale Bot
        env:
          BALE_TOKEN: ${{ secrets.BALE_TOKEN }}
        run: python bot/bale_bot.py
